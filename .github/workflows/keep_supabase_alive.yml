name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * *' # Runs once every day at 12:00 UTC
  workflow_dispatch: # Allows you to manually trigger it from the GitHub Actions tab

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send Authenticated Request to PostgREST
        run: |
          curl -i -X GET "https://umujhpryaohvkjskpeqq.supabase.co/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
